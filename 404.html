<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Stackly</title>
  <link rel="icon" type="image/webp" href="images/logo.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>

  <div class="page-404">
    <div class="geo-shape geo-shape-1"></div>
    <div class="geo-shape geo-shape-2"></div>
    <div class="geo-shape geo-shape-3"></div>

    <div class="container position-relative" style="z-index:2;">
      <div class="row justify-content-center">
        <div class="col-lg-8 text-center">
          <div class="error-code">404</div>
          <h2>Oops! Page Not Found</h2>
          <p class="mb-4">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>

          <!-- Quick Links -->
          <div class="d-flex flex-wrap gap-3 justify-content-center mb-4">
            <a href="index.html" class="btn btn-primary btn-lg"><i class="bi bi-house"></i> Go Home</a>
            <a href="services.html" class="btn btn-outline-light btn-lg"><i class="bi bi-grid-3x3-gap"></i> Services</a>
            <a href="contact.html" class="btn btn-outline-light btn-lg"><i class="bi bi-headset"></i> Contact Support</a>
          </div>

          <!-- Fun illustration with SVG -->
          <div style="margin-top:40px;">
            <svg width="200" height="120" viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="20" y="40" width="160" height="80" rx="10" fill="rgba(197,165,90,0.2)" stroke="rgba(197,165,90,0.3)" stroke-width="2"/>
              <rect x="30" y="50" width="140" height="50" rx="6" fill="rgba(197,165,90,0.1)"/>
              <circle cx="100" cy="30" r="16" fill="rgba(30,58,95,0.3)" stroke="rgba(30,58,95,0.5)" stroke-width="2"/>
              <text x="100" y="36" text-anchor="middle" fill="rgba(30,58,95,0.8)" font-size="18" font-weight="bold">?</text>
              <line x1="60" y1="65" x2="90" y2="65" stroke="rgba(197,165,90,0.4)" stroke-width="2" stroke-linecap="round"/>
              <line x1="60" y1="75" x2="110" y2="75" stroke="rgba(197,165,90,0.3)" stroke-width="2" stroke-linecap="round"/>
              <line x1="60" y1="85" x2="80" y2="85" stroke="rgba(197,165,90,0.2)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
