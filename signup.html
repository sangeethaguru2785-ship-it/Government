<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Stackly</title>
  <link rel="icon" type="image/webp" href="images/logo.webp">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(15,23,42,0.85) 0%, rgba(30,41,59,0.85) 40%, rgba(51,65,85,0.85) 100%), url('images/footerportal.webp') center/cover no-repeat;
      padding: 24px;
    }
    .auth-page {
      width: 100%;
      max-width: 960px;
      min-height: 560px;
      display: flex;
      border-radius: var(--radius-xl, 20px);
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.15);
      background: var(--white);
    }
    .auth-visual {
      flex: 0 0 45%;
      background: linear-gradient(160deg, #1E293B 0%, #0F172A 60%, #020617 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 48px 36px;
    }
    .auth-visual .geo-shape { display: none; }
    .auth-visual-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: var(--white);
    }
    .auth-visual-content h3 {
      color: var(--white);
      font-size: 1.5rem;
      margin-bottom: 12px;
    }
    .auth-visual-content p {
      color: var(--gray-400);
      font-size: 0.9rem;
      max-width: 280px;
      margin: 0 auto;
    }
    .auth-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 36px;
      overflow-y: auto;
    }
    .auth-form-wrapper {
      width: 100%;
      max-width: 420px;
    }
    .auth-form-wrapper h2 {
      font-size: 1.75rem;
      margin-bottom: 6px;
      color: var(--navy);
    }
    .auth-form-wrapper .subtitle {
      color: var(--gray-600);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .account-type-selector {
      display: flex;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .account-type-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      border: none;
      background: var(--white);
      color: var(--gray-600);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .account-type-btn i { font-size: 1rem; }
    .account-type-btn:hover {
      background: var(--gray-100);
      color: var(--primary);
    }
    .account-type-btn.active {
      background: var(--primary);
      color: var(--white);
    }
    .account-type-btn:not(:last-child) {
      border-right: 2px solid var(--gray-200);
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--gray-500);
      font-size: 0.8rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }
    .social-login {
      display: flex;
      gap: 12px;
    }
    .social-login-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      background: var(--white);
      color: var(--gray-700);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .social-login-btn:hover {
      background: var(--gray-100);
      border-color: var(--gray-300);
    }
    .password-toggle {
      border-left: 0;
      background: var(--white);
    }

    /* Responsive */
    @media (max-width: 991px) {
      .auth-page {
        flex-direction: column;
        max-width: 480px;
        min-height: auto;
      }
      .auth-visual {
        flex: none;
        padding: 36px 24px;
      }
      .auth-panel {
        padding: 36px 28px;
      }
    }
    @media (max-width: 575px) {
      body { padding: 12px; }
      .auth-panel { padding: 28px 20px; }
      .auth-visual { padding: 28px 20px; }
      .auth-visual-content h3 { font-size: 1.25rem; }
      .social-login { flex-direction: column; }
    }
  </style>
</head>
<body class="page-transition-in">

  <div class="auth-page">
    <!-- Visual Panel (Left) -->
    <div class="auth-visual">
      <div class="auth-visual-content">
        <i class="bi bi-people" style="font-size:4rem;margin-bottom:20px;display:block;opacity:0.25;"></i>
        <h3>Join 50,000+ Citizens</h3>
        <p>Sign up today and get instant access to 120+ government services from a single platform.</p>
        <div class="d-flex gap-4 mt-4 justify-content-center">
          <div class="text-center">
            <div style="font-size:1.5rem;font-weight:800;color:var(--white);">120+</div>
            <div style="font-size:0.75rem;color:var(--gray-500);">Services</div>
          </div>
          <div class="text-center">
            <div style="font-size:1.5rem;font-weight:800;color:var(--white);">25+</div>
            <div style="font-size:0.75rem;color:var(--gray-500);">Departments</div>
          </div>
          <div class="text-center">
            <div style="font-size:1.5rem;font-weight:800;color:var(--white);">24/7</div>
            <div style="font-size:0.75rem;color:var(--gray-500);">Available</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Form Panel (Right) -->
    <div class="auth-panel">
      <div class="auth-form-wrapper">
        <a href="index.html" class="d-flex align-items-center gap-2 mb-4">
          <img src="images/logo.webp" alt="Stackly" class="brand-logo-img">
        </a>
        <h2>Create Account</h2>
        <p class="subtitle">Sign up to access all government services</p>

        <!-- Account Type Selector -->
        <div class="account-type-selector">
          <button type="button" class="account-type-btn active" data-type="citizen" onclick="selectAccountType(this)">
            <i class="bi bi-person"></i> Citizen
          </button>
          <button type="button" class="account-type-btn" data-type="admin" onclick="selectAccountType(this)">
            <i class="bi bi-shield-lock"></i> Admin
          </button>
        </div>

        <form id="signupForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First Name *</label>
              <input type="text" class="form-control" id="signupFirstName" placeholder="First name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name *</label>
              <input type="text" class="form-control" id="signupLastName" placeholder="Last name" required>
            </div>
            <div class="col-12">
              <label class="form-label">Email Address *</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="signupEmail" placeholder="your@email.com" required>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Phone Number *</label>
              <div class="input-group">
                <span class="input-group-text">+91</span>
                <input type="tel" class="form-control" placeholder="XXXXX XXXXX" required>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Aadhaar Number *</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                <input type="text" class="form-control" placeholder="XXXX XXXX XXXX" maxlength="14" required>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Create Password *</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" placeholder="Min 8 characters" required>
                <button class="btn btn-outline-secondary password-toggle" type="button"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="col-12">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                <label class="form-check-label" for="agreeTerms" style="font-size:0.8rem;">
                  I agree to the <a href="#" style="color:var(--primary);">Terms of Service</a> and <a href="#" style="color:var(--primary);">Privacy Policy</a>
                </label>
              </div>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100 btn-lg mt-1">
                <i class="bi bi-person-plus"></i> Create Account
              </button>
            </div>
          </div>
        </form>

        <p class="text-center mt-3" style="font-size:0.85rem;color:var(--gray-600);">
          Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600;">Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    var selectedAccountType = 'citizen';

    function selectAccountType(btn) {
      document.querySelectorAll('.account-type-btn').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      selectedAccountType = btn.getAttribute('data-type');
    }

    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('signupEmail').value.trim();
      if (!email) return;
      localStorage.setItem('stackly_user', JSON.stringify({ email: email, role: selectedAccountType }));
      if (selectedAccountType === 'admin') {
        window.location.href = 'admin-dashboard.html';
      } else {
        window.location.href = 'citizen-dashboard.html';
      }
    });
  </script>
</body>
</html>
