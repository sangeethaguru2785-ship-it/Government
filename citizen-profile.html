<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Stackly</title>
  <link rel="icon" type="image/webp" href="images/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close" onclick="document.getElementById('sidebar').classList.remove('show');document.getElementById('sidebarOverlay').classList.remove('show');">
        <i class="bi bi-x-lg"></i>
      </button>
      <div class="sidebar-header">
        <div class="sidebar-logo"><img src="images/logo.webp" alt="Stackly" class="brand-logo-img"></div>
      </div>
      <nav class="sidebar-menu">
        <div class="sidebar-menu-label">Main</div>
        <div class="sidebar-menu-item">
          <a href="citizen-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        </div>
        <div class="sidebar-menu-item">
          <a href="citizen-applications.html"><i class="bi bi-file-earmark-text"></i> My Applications</a>
        </div>
        <div class="sidebar-menu-item">
          <a href="citizen-certificates.html"><i class="bi bi-receipt"></i> Certificates</a>
        </div>
        <div class="sidebar-menu-item">
          <a href="citizen-payments.html"><i class="bi bi-cash-stack"></i> Payments</a>
        </div>
        <div class="sidebar-menu-label">Services</div>
        <div class="sidebar-menu-item">
          <a href="citizen-services.html"><i class="bi bi-grid-3x3-gap"></i> All Services</a>
        </div>
        <div class="sidebar-menu-item">
          <a href="citizen-schemes.html"><i class="bi bi-gift"></i> Schemes</a>
        </div>
        <div class="sidebar-menu-item">
          <a href="citizen-appointments.html"><i class="bi bi-calendar-check"></i> Appointments</a>
        </div>
        <div class="sidebar-menu-label">Account</div>
        <div class="sidebar-menu-item">
          <a href="citizen-profile.html" class="active"><i class="bi bi-person"></i> My Profile</a>
        </div>
        <div class="sidebar-menu-item">
          <a href="citizen-notifications.html"><i class="bi bi-bell"></i> Notifications <span class="badge bg-danger rounded-pill">3</span></a>
        </div>
        <div class="sidebar-menu-item">
          <a href="citizen-settings.html"><i class="bi bi-gear"></i> Settings</a>
        </div>
        <div class="sidebar-menu-bottom">
          <div class="sidebar-profile" id="sidebarProfile">
            <div class="sidebar-profile-avatar" id="sidebar-profile-avatar"></div>
            <div class="sidebar-profile-info">
              <div class="sidebar-profile-name" id="sidebar-profile-name"></div>
              <div class="sidebar-profile-email" id="sidebar-profile-email"></div>
              <div class="sidebar-profile-role" id="sidebar-profile-role"></div>
            </div>
          </div>
          <div class="sidebar-menu-item">
            <a href="login.html" onclick="StacklyAuth.logout(); return false;"><i class="bi bi-box-arrow-left"></i> Logout</a>
          </div>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <div class="dashboard-main">
      <!-- Dashboard Content -->
      <div class="dashboard-content">
        <div class="dashboard-topbar">
          <div class="d-flex align-items-center gap-3">
            <button class="dashboard-mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('show');document.getElementById('sidebarOverlay').classList.toggle('show');">
              <i class="bi bi-list"></i>
            </button>
            <div>
              <h4 class="mb-1">My Profile</h4>
              <p class="text-muted mb-0" style="font-size:0.9rem;">View and manage your personal information.</p>
            </div>
          </div>
          <span></span>
        </div>

        <div class="row g-4">
          <!-- Left Column: Profile Summary -->
          <div class="col-lg-4">
            <div class="chart-card">
              <div class="chart-card-body text-center" style="padding:2rem 1.5rem;">
                <div id="profileAvatar" style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-weight:700;margin-bottom:1rem;"></div>
                <h5 class="mb-1" id="profileName">—</h5>
                <p class="text-muted mb-3" style="font-size:0.85rem;" id="profileEmail">—</p>
                <p class="text-muted mb-3" style="font-size:0.85rem;"><i class="bi bi-telephone me-1"></i> +91 98765 43210</p>
                <p class="text-muted mb-4" style="font-size:0.85rem;"><i class="bi bi-calendar3 me-1"></i> Member since Jan 2024</p>
                <button class="btn btn-primary" style="background:var(--primary);border-color:var(--primary);width:100%;">
                  <i class="bi bi-pencil-square me-1"></i> Edit Profile
                </button>
              </div>
            </div>
          </div>

          <!-- Right Column: Forms -->
          <div class="col-lg-8">
            <div class="chart-card mb-4">
              <div class="chart-card-header">
                <h5><i class="bi bi-person-lines-fill text-primary"></i> Personal Information</h5>
              </div>
              <div class="chart-card-body">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Full Name</label>
                    <input type="text" class="form-control" id="profileNameInput" value="" data-validate="name">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Date of Birth</label>
                    <input type="date" class="form-control" value="1995-03-15">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Gender</label>
                    <select class="form-select">
                      <option selected>Male</option>
                      <option>Female</option>
                      <option>Other</option>
                      <option>Prefer not to say</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Aadhaar Number</label>
                    <input type="text" class="form-control" id="profileAadhaar" name="aadhaar" inputmode="numeric" pattern="\d{12}" value="" placeholder="Enter 12-digit Aadhaar number" maxlength="12" data-validate="aadhaar">
                  </div>
                </div>
              </div>
            </div>

            <div class="chart-card mb-4">
              <div class="chart-card-header">
                <h5><i class="bi bi-telephone text-primary"></i> Contact Information</h5>
              </div>
              <div class="chart-card-body">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Email</label>
                    <input type="email" class="form-control" value="rahul.sharma@email.com" data-validate="email">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Phone</label>
                    <input type="tel" class="form-control" value="+91 98765 43210" data-validate="phone" maxlength="10" onkeypress="return event.charCode >= 48 && event.charCode <= 57">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Alternate Phone</label>
                    <input type="tel" class="form-control" value="+91 91234 56789" data-validate="phone" maxlength="10" onkeypress="return event.charCode >= 48 && event.charCode <= 57">
                  </div>
                </div>
              </div>
            </div>

            <div class="chart-card mb-4">
              <div class="chart-card-header">
                <h5><i class="bi bi-geo-alt text-primary"></i> Address</h5>
              </div>
              <div class="chart-card-body">
                <div class="row g-3">
                  <div class="col-12">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Street Address</label>
                    <input type="text" class="form-control" value="42 MG Road, Near City Park">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">City</label>
                    <input type="text" class="form-control" value="New Delhi">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">State</label>
                    <select class="form-select">
                      <option>Andhra Pradesh</option>
                      <option>Bihar</option>
                      <option>Delhi</option>
                      <option selected>Delhi</option>
                      <option>Gujarat</option>
                      <option>Karnataka</option>
                      <option>Maharashtra</option>
                      <option>Tamil Nadu</option>
                      <option>Uttar Pradesh</option>
                      <option>West Bengal</option>
                    </select>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label" style="font-size:0.85rem;font-weight:600;">Pincode</label>
                    <input type="text" class="form-control" value="110001" maxlength="6">
                  </div>
                </div>
              </div>
            </div>

            <div class="text-end">
              <button class="btn btn-primary" style="background:var(--primary);border-color:var(--primary);padding:0.5rem 2rem;">
                <i class="bi bi-check-lg me-1"></i> Save Changes
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/validation.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js" defer></script>
  <script>
    if (StacklyAuth.guard('citizen')) {
      StacklyAuth.populateTopbar();
      StacklyAuth.populateSidebarProfile();
      var pAvatar = document.getElementById('profileAvatar');
      var pName = document.getElementById('profileName');
      var pEmail = document.getElementById('profileEmail');
      var pInput = document.getElementById('profileNameInput');
      if (pAvatar) { pAvatar.textContent = StacklyAuth.getInitials(); pAvatar.style.background = 'linear-gradient(135deg,' + StacklyAuth.getInitialsColor() + ',' + StacklyAuth.getInitialsColor() + 'cc)'; }
      if (pName) pName.textContent = StacklyAuth.getName() || '—';
      if (pEmail) pEmail.textContent = StacklyAuth.getUser().email;
      if (pInput) pInput.value = StacklyAuth.getName();
    }
  </script>
</body>
</html>
